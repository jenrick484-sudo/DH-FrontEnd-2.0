<h1>Sales Report</h1>
<div>
  <label>Year:</label>
  <input type="number" id="yearFilter" placeholder="e.g., 2026">
  <label>Month:</label>
  <input type="number" id="monthFilter" min="1" max="12" placeholder="1-12">
  <label>Day:</label>
  <input type="number" id="dayFilter" min="1" max="31" placeholder="1-31">
  <button id="generateReportBtn">Generate Report</button>
</div>
<table id="reportTable" border="1">
  <thead><tr><th>Date</th><th>Total Sales</th><th>Transactions</th></tr></thead>
  <tbody></tbody>
</table>
