<h1>Manage Items</h1>
<form id="addItemForm">
  <input type="text" id="itemName" placeholder="Item name" required>
  <input type="number" id="itemPrice" placeholder="Price" step="0.01" required>
  <input type="text" id="itemDesc" placeholder="Description">
  <input type="number" id="initialStock" placeholder="Initial stock" value="0">
  <button type="submit">Add Item</button>
</form>
<table id="itemsTable" border="1">
  <thead><tr><th>Name</th><th>Description</th><th>Price</th></tr></thead>
  <tbody></tbody>
</table>
